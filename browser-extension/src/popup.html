<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loop Capture</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #0f1419 0%, #1a2332 100%);
      color: #fff;
    }

    .header {
      padding: 20px;
      background: linear-gradient(135deg, #1B4D3E 0%, #2E7D5A 100%);
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 12px;
      opacity: 0.9;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 20px;
    }

    .stat-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #D4AF37;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      opacity: 0.7;
      margin-top: 4px;
    }

    .earnings-card {
      margin: 0 20px 20px;
      background: linear-gradient(135deg, rgba(212,175,55,0.2) 0%, rgba(212,175,55,0.05) 100%);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .earnings-label {
      font-size: 12px;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .earnings-value {
      font-size: 36px;
      font-weight: 700;
      color: #D4AF37;
      margin: 8px 0;
    }

    .earnings-currency {
      font-size: 14px;
      opacity: 0.7;
    }

    .wallet-section {
      padding: 0 20px 20px;
    }

    .wallet-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .wallet-btn.connect {
      background: linear-gradient(135deg, #1B4D3E 0%, #2E7D5A 100%);
      color: white;
    }

    .wallet-btn.connect:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(27,77,62,0.4);
    }

    .wallet-btn.connected {
      background: rgba(255,255,255,0.1);
      color: #4ade80;
    }

    .wallet-address {
      font-family: monospace;
      font-size: 12px;
      opacity: 0.7;
      margin-top: 8px;
    }

    .recent-section {
      padding: 0 20px 20px;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 12px;
    }

    .capture-item {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .capture-icon {
      font-size: 20px;
    }

    .capture-details {
      flex: 1;
      min-width: 0;
    }

    .capture-domain {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .capture-time {
      font-size: 11px;
      opacity: 0.5;
    }

    .capture-commission {
      font-size: 11px;
      color: #4ade80;
    }

    .footer {
      padding: 16px 20px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .footer-link {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 12px;
    }

    .footer-link:hover {
      color: #D4AF37;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      opacity: 0.5;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🔄 Loop Capture</div>
    <div class="tagline">Earn from every link you share</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="total-captures">0</div>
      <div class="stat-label">Links Captured</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="this-week">0</div>
      <div class="stat-label">This Week</div>
    </div>
  </div>

  <div class="earnings-card">
    <div class="earnings-label">Total Earnings</div>
    <div class="earnings-value" id="total-earnings">$0.00</div>
    <div class="earnings-currency">Cred (stacking at 12% APY)</div>
  </div>

  <div class="wallet-section">
    <button class="wallet-btn connect" id="wallet-btn">
      Connect Wallet
    </button>
    <div class="wallet-address" id="wallet-address"></div>
  </div>

  <div class="recent-section">
    <div class="section-title">Recent Captures</div>
    <div id="recent-captures">
      <div class="empty-state">
        <div class="empty-state-icon">🔗</div>
        <div>Copy any product link to start capturing</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://looplocal.io" target="_blank" class="footer-link">
      Powered by Loop Protocol
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
